apply plugin: 'com.android.application'

// Release signing. Two ways to supply the key + password, both per
// RELEASE-SIGNING.md (env wins if both are set):
//   1. Environment variables (nothing stored at rest — export them via
//      `read -s` right before assembleRelease):
//        MATERIALIZR_KEYSTORE, MATERIALIZR_STORE_PASSWORD,
//        MATERIALIZR_KEY_ALIAS (default "materializr"), MATERIALIZR_KEY_PASSWORD
//        (defaults to the store password — PKCS12 uses one password).
//   2. The gitignored android/keystore.properties file.
// When neither is provided (CI, fresh clone, debug work) release builds go
// unsigned; assembleDebug is never affected.
def keystorePropsFile = rootProject.file('keystore.properties')
def keystoreProps = new Properties()
if (keystorePropsFile.exists()) {
    keystoreProps.load(new FileInputStream(keystorePropsFile))
}
def signStore   = System.getenv('MATERIALIZR_KEYSTORE')       ?: keystoreProps['storeFile']
def signStorePw = System.getenv('MATERIALIZR_STORE_PASSWORD') ?: keystoreProps['storePassword']
def signAlias   = System.getenv('MATERIALIZR_KEY_ALIAS')      ?: keystoreProps['keyAlias'] ?: 'materializr'
def signKeyPw   = System.getenv('MATERIALIZR_KEY_PASSWORD')   ?: keystoreProps['keyPassword'] ?: signStorePw
def hasReleaseSigning = signStore?.trim() && signStorePw?.trim()

android {
    namespace 'com.materializr.app'
    compileSdkVersion 35
    // NDK r28+ ships a 16 KB-aligned libc++_shared.so and defaults to 16 KB
    // page alignment (required by Play for Android 15+). r26's prebuilt STL was
    // 4 KB. OCCT is still cross-built with r26 (its .so are 16 KB via the linker
    // flag in setup-deps.sh) and links fine against the r28-built app + STL.
    ndkVersion '28.2.13676358'

    defaultConfig {
        // Published package name. The public/open-source default is
        // com.materializr.app; a private Play listing overrides it WITHOUT the
        // override reaching git — set MATERIALIZR_APP_ID or applicationId= in the
        // gitignored keystore.properties. Kept separate from `namespace` above
        // (the internal code/JNI package), so SDL/native class names never move.
        applicationId (System.getenv('MATERIALIZR_APP_ID')
                       ?: keystoreProps['applicationId'] ?: 'com.materializr.app')
        minSdkVersion 24
        targetSdkVersion 35
        // Multi-APK: one ABI per build, chosen with -PtargetAbi=arm64-v8a
        // (default) or -PtargetAbi=x86_64 (Chromebooks / Intel tablets).
        // Each ABI needs its own versionCode on the Play Store; x86_64 gets
        // the higher code so x86 devices with ARM translation still receive
        // the native build.
        //   -PallAbi  → single build with BOTH ABIs and ONE versionCode, for an
        //               app bundle (bundleRelease). Play splits per device, so a
        //               universal AAB replaces the two per-ABI APKs.
        def targetAbi = project.hasProperty('targetAbi') ? project.targetAbi
                                                         : 'arm64-v8a'
        def allAbi    = project.hasProperty('allAbi')
        def abiList   = allAbi ? ['arm64-v8a', 'x86_64'] : [targetAbi]
        versionCode (allAbi ? 40 : (targetAbi == 'x86_64' ? 38 : 37))
        def vName = '1.5.0'
        versionName vName

        externalNativeBuild {
            cmake {
                // Cross-built OCCT location: env override, else ~/Android/prefix.
                // For -PallAbi pass the BASE dir; src/CMakeLists appends the ABI
                // per configure so each ABI links its own OCCT.
                def occtPrefix = System.getenv('MATERIALIZR_OCCT_PREFIX') ?:
                                 (allAbi ? "${System.getenv('HOME')}/Android/prefix"
                                         : "${System.getenv('HOME')}/Android/prefix/${targetAbi}")
                // c++_shared is required: OCCT and the app throw C++ exceptions
                // across .so boundaries, which needs a single shared runtime.
                // Pass versionName through so the native splash version can't
                // drift from build.gradle (it silently did, pre-1.2.3).
                arguments '-DANDROID_STL=c++_shared',
                          "-DMATERIALIZR_OCCT_PREFIX=${occtPrefix}".toString(),
                          "-DMATERIALIZR_VERSION_NAME=${vName}".toString()
                cppFlags '-std=c++17', '-frtti', '-fexceptions'
            }
        }
        ndk {
            // One ABI per APK, or every ABI for a -PallAbi bundle (see above).
            abiFilters.addAll(abiList)
        }
    }

    externalNativeBuild {
        cmake {
            path 'jni/CMakeLists.txt'
            version '3.22.1'
        }
    }

    sourceSets.main {
        // Cross-built OCCT .so files are dropped here and packaged into the APK.
        jniLibs.srcDirs = ['src/main/jniLibs']
        // Shaders / fonts the app loads at runtime.
        assets.srcDirs = ['src/main/assets']
    }

    packagingOptions {
        // OCCT ships many large .so; don't let the build dedupe/strip break them.
        jniLibs.useLegacyPackaging true
        // AGP 8.6 / NDK r28 copy path-linked shared libs into the CMake output
        // dir, so every OCCT toolkit reaches the merger twice — once from
        // jniLibs (our staged copies) and once from the cxx build. They're the
        // same bytes; take the first. (Bundles dedupe this themselves — only
        // per-ABI APK builds hit the DuplicateRelativeFileException.)
        jniLibs.pickFirsts.add('lib/**/libTK*.so')
    }

    signingConfigs {
        release {
            if (hasReleaseSigning) {
                storeFile     file(signStore)
                storePassword signStorePw
                keyAlias      signAlias
                keyPassword   signKeyPw
            }
        }
    }

    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'
            // Sign the release with the real key only when it's configured;
            // otherwise assembleRelease produces an unsigned APK (no debug-key
            // fallback, so an unsigned build is obvious rather than silently
            // shipped with the wrong signature).
            if (hasReleaseSigning) {
                signingConfig signingConfigs.release
            }
        }
    }
    lint { abortOnError false }
}

dependencies {
    implementation fileTree(include: ['*.jar'], dir: 'libs')
}
