name: Windows Build

# Builds a native Windows x64 executable (MSVC) with OpenCASCADE from vcpkg,
# and publishes a portable .zip and an NSIS installer as artifacts. On a GitHub
# Release it also attaches both. The Linux/AppImage build is unaffected.

on:
  push:
    branches: [ main ]
    paths-ignore:
      - '**.md'
      - 'scripts/**'
  workflow_dispatch:
  release:
    types: [ published ]

jobs:
  windows:
    runs-on: windows-latest

    # `packages: write` lets us push compiled vcpkg binaries (OpenCASCADE etc.)
    # to the repo's GitHub Packages NuGet feed so the next build can pull them
    # back. `contents: write` is for softprops/action-gh-release to attach
    # build artifacts when a Release is published.
    permissions:
      contents: write
      packages: write

    env:
      # vcpkg binary cache via NuGet on GitHub Packages. The first build writes
      # OCCT (and friends) into the feed; subsequent builds download the
      # binaries instead of recompiling, dropping OCCT's ~1h cold compile to
      # a few minutes. Replaces the now-removed `x-gha` backend.
      VCPKG_BINARY_SOURCES: "clear;nuget,GitHub,readwrite"
      # Where the NuGet feed lives. Per-org URL; ${{ github.repository_owner }}
      # resolves to materializr-cad for this repo, but stays correct on forks.
      NUGET_FEED_URL: "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json"

    steps:
      - uses: actions/checkout@v4

      # Wire vcpkg up to authenticate against the GitHub Packages NuGet feed.
      # GITHUB_TOKEN is the workflow's own short-lived token; with the
      # `packages: write` permission above it can both pull cached binaries
      # and push new ones.
      - name: Configure vcpkg binary cache (GitHub Packages NuGet feed)
        shell: pwsh
        run: |
          $nuget = & "$env:VCPKG_INSTALLATION_ROOT\vcpkg.exe" fetch nuget | Select-Object -Last 1
          & $nuget sources add `
            -Source "$env:NUGET_FEED_URL" `
            -StorePasswordInClearText `
            -Name "GitHub" `
            -UserName "${{ github.repository_owner }}" `
            -Password "${{ secrets.GITHUB_TOKEN }}"
          & $nuget setapikey "${{ secrets.GITHUB_TOKEN }}" -Source "$env:NUGET_FEED_URL"

      - name: Install dependencies (OpenCASCADE + GLEW) via vcpkg
        shell: pwsh
        run: |
          & "$env:VCPKG_INSTALLATION_ROOT\vcpkg.exe" install `
            opencascade:x64-windows glew:x64-windows curl:x64-windows

      - name: Configure
        shell: pwsh
        run: |
          cmake -B build -S . `
            -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake" `
            -DVCPKG_TARGET_TRIPLET=x64-windows `
            -DBUILD_TESTS=OFF

      - name: Build
        shell: pwsh
        run: cmake --build build --config Release --parallel

      - name: Stage portable package
        shell: pwsh
        run: |
          $stage = "staging/Materializr"
          New-Item -ItemType Directory -Force -Path $stage | Out-Null
          # The executable (location varies by generator).
          $exe = Get-ChildItem -Recurse -Path build -Filter materializr.exe | Select-Object -First 1
          Copy-Item $exe.FullName $stage/
          # Runtime DLLs: vcpkg copies most next to the exe; also pull the full
          # set from the vcpkg install tree to be safe (a few extras don't hurt).
          Copy-Item "$($exe.Directory.FullName)/*.dll" $stage/ -ErrorAction SilentlyContinue
          Copy-Item "$env:VCPKG_INSTALLATION_ROOT/installed/x64-windows/bin/*.dll" $stage/ -ErrorAction SilentlyContinue
          Get-ChildItem $stage | Format-Table Name,Length

      - name: Create portable zip
        shell: pwsh
        run: Compress-Archive -Path staging/Materializr/* -DestinationPath Materializr-windows-x64.zip -Force

      - name: Upload portable artifact
        uses: actions/upload-artifact@v4
        with:
          name: Materializr-windows-x64-portable
          path: Materializr-windows-x64.zip

      - name: Build installer (NSIS)
        shell: pwsh
        run: |
          choco install nsis -y --no-progress
          & "C:\Program Files (x86)\NSIS\makensis.exe" `
            "/DSTAGING=$PWD\staging\Materializr" `
            "/DOUTFILE=$PWD\Materializr-Setup.exe" `
            "/DAPPVERSION=${{ github.ref_name }}" `
            packaging\windows\installer.nsi

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: Materializr-windows-x64-installer
          path: Materializr-Setup.exe

      - name: Attach to GitHub Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            Materializr-windows-x64.zip
            Materializr-Setup.exe
